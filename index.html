<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSU CBT Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>TSU CBT PRACTICE</h1>

        <!-- MODE SELECT -->
        <div class="mode-select">
            <button onclick="setMode('single')" class="active">Single Player</button>
            <button onclick="setMode('two')">Two Players</button>
        </div>

        <!-- TIME SELECT -->
        <div class="time-select">
            <button onclick="setTime(600)" class="active">10 Minutes</button>
            <button onclick="setTime(900)">15 Minutes</button>
            <button onclick="setTime(1200)">20 Minutes</button>
        </div>

        <!-- COURSE SELECT -->
        <h2>Select Course</h2>
        <div class="courses">
            <button onclick="loadCourse('gst')">GST</button>
            <button onclick="loadCourse('physics')">PHYSICS</button>
            <button onclick="loadCourse('chemistry')">CHEMISTRY</button>
            <button onclick="loadCourse('biology')">BIOLOGY</button>
            <button onclick="loadCourse('mathematics')">MATHEMATICS</button>
        </div>

        <!-- TOPICS SECTION -->
        <div id="topics-section" class="hidden">
            <h2 id="course-title"></h2>
            <button onclick="goBack()">← Back to Courses</button>
            <h3>100 LEVEL - FIRST SEMESTER</h3>
            <div id="topics101"></div>
            <h3>100 LEVEL - SECOND SEMESTER</h3>
            <div id="topics102"></div>
        </div>

        <!-- QUIZ SECTION -->
        <div id="quiz-section" class="hidden">
            <h3 id="quiz-topic"></h3>
            <div class="quiz-header">
                <p>Time: <span id="timer">10:00</span></p>
                <p>Score: <span id="score">0</span> / <span id="total">0</span></p>
            </div>
            <div id="question-box"></div>
            <button onclick="exitQuiz()">Exit Quiz</button>
        </div>

        <!-- RESULT SECTION -->
        <div id="result-section" class="hidden">
            <h2>Quiz Completed!</h2>
            <p>Your Score: <span id="final-score"></span></p>
            <button onclick="restartQuiz()">Restart</button>
            <button onclick="goBack()">Go Back</button>
        </div>
    </div>


    <!-- 1. DATA FILES FIRST -->
    <script src="data-gst.js"></script>
    <script src="data-physics.js"></script>
    <script src="data-chemistry.js"></script>
    <script src="data-biology.js"></script>
    <script src="data-mathematics.js"></script>

    <!-- 2. MAIN SCRIPT LAST -->
    <script src="script.js"></script>
</body>
</html>
